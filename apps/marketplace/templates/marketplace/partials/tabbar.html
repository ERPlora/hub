{% load i18n djicons %}

{# Marketplace Tab Bar #}
<nav class="tabs tabs-bottom" {% if oob %}hx-swap-oob="true" id="global-tabbar"{% endif %}>
    {# Modules Tab #}
    <a href="{% url 'marketplace:index' %}"
       class="tab tab-icon-top {% if store_type == 'modules' %}tab-active{% endif %}"
       hx-get="{% url 'marketplace:index' %}"
       hx-target="#main-content-area"
       hx-push-url="true">
        <span class="tab-icon">
            {% icon "cube-outline" %}
        </span>
        <span class="tab-label">{% trans "Modules" %}</span>
    </a>

    {# Hubs Tab #}
    <a href="{% url 'marketplace:store_hubs' %}"
       class="tab tab-icon-top {% if store_type == 'hubs' %}tab-active{% endif %}"
       hx-get="{% url 'marketplace:store_hubs' %}"
       hx-target="#main-content-area"
       hx-push-url="true">
        <span class="tab-icon">
            {% icon "server-outline" %}
        </span>
        <span class="tab-label">{% trans "Hubs" %}</span>
    </a>

    {# Components Tab (Coming Soon) #}
    <span class="tab tab-icon-top tab-disabled">
        <span class="tab-icon">
            {% icon "hardware-chip-outline" %}
        </span>
        <span class="tab-label">{% trans "Components" %}</span>
        <span class="badge">{% trans "Soon" %}</span>
    </span>

</nav>
