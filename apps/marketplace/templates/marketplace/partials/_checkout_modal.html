{% load i18n %}
{# Lazy Stripe Embedded Checkout — safe to include in any partial (HTMX or full page) #}
<script>
(function() {
    if (window._checkoutModalReady) return;
    window._checkoutModalReady = true;

    var stripeInstance = null;
    var checkoutInstance = null;

    function ensureModalDOM() {
        if (document.getElementById('checkout-modal')) return;
        var backdrop = document.createElement('div');
        backdrop.className = 'modal-backdrop';
        backdrop.id = 'checkout-modal';
        backdrop.setAttribute('data-state', 'closed');
        backdrop.innerHTML =
            '<div class="modal max-w-xl max-h-[90vh]">' +
                '<div class="modal-header">' +
                    '<h2 class="modal-title">{% trans "Complete Purchase" %}</h2>' +
                    '<button class="modal-close" onclick="closeCheckoutModal()">&times;</button>' +
                '</div>' +
                '<div class="modal-body p-0 min-h-[400px] overflow-y-auto">' +
                    '<div id="checkout-loading" class="flex items-center justify-center p-8">' +
                        '<span class="loading"></span>' +
                        '<span class="ml-3 opacity-60">{% trans "Loading payment form..." %}</span>' +
                    '</div>' +
                    '<div id="checkout-container"></div>' +
                '</div>' +
            '</div>';
        document.body.appendChild(backdrop);
    }

    function loadStripeJS() {
        return new Promise(function(resolve, reject) {
            if (window.Stripe) { resolve(); return; }
            var script = document.createElement('script');
            script.src = 'https://js.stripe.com/v3/';
            script.onload = resolve;
            script.onerror = function() { reject(new Error('Failed to load Stripe.js')); };
            document.head.appendChild(script);
        });
    }

    window.openCheckoutModal = function(clientSecret, publishableKey) {
        ensureModalDOM();
        var modal = document.getElementById('checkout-modal');
        var loading = document.getElementById('checkout-loading');
        var container = document.getElementById('checkout-container');

        modal.setAttribute('data-state', 'open');
        loading.style.display = 'flex';
        container.style.display = 'none';

        loadStripeJS().then(function() {
            if (!stripeInstance) {
                stripeInstance = Stripe(publishableKey);
            }
            return stripeInstance.initEmbeddedCheckout({
                clientSecret: clientSecret,
                onComplete: function() {
                    if (checkoutInstance) {
                        checkoutInstance.destroy();
                        checkoutInstance = null;
                    }
                    modal.setAttribute('data-state', 'closed');
                    if (typeof Toast !== 'undefined') Toast.success('{% trans "Payment successful!" %}');
                    if (typeof htmx !== 'undefined') {
                        htmx.ajax('GET', window.location.pathname, { target: '#main-content-area', swap: 'innerHTML' });
                    } else {
                        window.location.reload();
                    }
                },
            });
        }).then(function(checkout) {
            checkoutInstance = checkout;
            loading.style.display = 'none';
            container.style.display = 'block';
            checkout.mount('#checkout-container');
        }).catch(function(err) {
            console.error('Stripe init error:', err);
            modal.setAttribute('data-state', 'closed');
            if (typeof Toast !== 'undefined') Toast.error('{% trans "Error loading payment form." %}');
        });
    };

    window.closeCheckoutModal = function() {
        if (checkoutInstance) {
            checkoutInstance.destroy();
            checkoutInstance = null;
        }
        var modal = document.getElementById('checkout-modal');
        if (modal) modal.setAttribute('data-state', 'closed');
    };
})();
</script>
