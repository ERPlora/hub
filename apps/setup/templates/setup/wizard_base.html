{% extends "base.html" %}
{% load static i18n djicons %}

{% block title %}ERPlora Hub - {% trans "Setup" %}{% endblock %}

{% block extra_css %}
<style>
    .setup-bg {
        background: var(--color-base-200);
        color: var(--color-base-content);
    }

    .setup-bg::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 80% 60% at 70% 10%, color-mix(in oklch, var(--color-primary) 15%, transparent) 0%, transparent 60%),
            radial-gradient(ellipse 70% 50% at 20% 90%, color-mix(in oklch, var(--color-secondary) 12%, transparent) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .setup-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1.5rem;
        position: relative;
        z-index: 1;
        min-height: 100dvh;
    }

    .setup-card {
        width: 100%;
        max-width: 640px;
    }

    /* Progress bar */
    .setup-progress {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 2rem;
        width: 100%;
        max-width: 640px;
    }

    .setup-progress-step {
        flex: 1;
        height: 4px;
        border-radius: 2px;
        background: var(--color-base-300);
        transition: background 0.3s;
    }

    .setup-progress-step.active {
        background: var(--color-primary);
    }

    .setup-progress-step.completed {
        background: var(--color-success);
    }

    /* Step header */
    .setup-step-header {
        text-align: center;
        margin-bottom: 1.5rem;
    }

    .setup-step-number {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        background: var(--color-primary);
        color: var(--color-primary-content);
        font-weight: 600;
        font-size: 0.875rem;
        margin-bottom: 0.5rem;
    }

    .setup-step-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.25rem;
    }

    .setup-step-subtitle {
        color: color-mix(in oklch, var(--color-base-content) 60%, transparent);
        font-size: 0.875rem;
        margin: 0;
    }

    /* Sector/type selection grid */
    .setup-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 0.75rem;
    }

    .setup-grid-item {
        padding: 1rem;
        border-radius: 0.75rem;
        border: 2px solid var(--color-base-300);
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        background: color-mix(in oklch, var(--color-base-100) 80%, transparent);
    }

    .setup-grid-item:hover {
        border-color: var(--color-primary);
        background: color-mix(in oklch, var(--color-primary) 5%, var(--color-base-100));
    }

    .setup-grid-item.selected {
        border-color: var(--color-primary);
        background: color-mix(in oklch, var(--color-primary) 10%, var(--color-base-100));
    }

    .setup-grid-item .icon {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
        display: block;
    }

    .setup-grid-item .label {
        font-size: 0.8125rem;
        font-weight: 500;
    }

    /* Navigation buttons */
    .setup-nav {
        display: flex;
        justify-content: space-between;
        margin-top: 2rem;
        gap: 1rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="page setup-bg" style="height: 100dvh;">
    <div class="content setup-content">
        <!-- Logo -->
        <div class="flex items-center gap-2 mb-6">
            <img src="{% static 'img/logo.png' %}" alt="ERPlora" style="width: 32px; height: 32px;">
            <span class="font-semibold text-lg">ERPlora</span>
        </div>

        <!-- Progress Bar -->
        <div class="setup-progress">
            {% for step_num in "12345" %}
            <div class="setup-progress-step {% if forloop.counter < current_step %}completed{% elif forloop.counter == current_step %}active{% endif %}"></div>
            {% endfor %}
        </div>

        <!-- Card -->
        <div class="card glass setup-card">
            <div class="card-body">
                {% block wizard_content %}{% endblock %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
