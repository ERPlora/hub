{% load i18n djicons %}

<div class="setup-grid">
    {% for type in types %}
    <div class="setup-grid-item"
         :class="{ 'selected': selectedTypes.includes('{{ type.code }}') }"
         @click="toggleType('{{ type.code }}')">
        {% if type.icon %}{% icon type.icon %}{% endif %}
        <span class="label">{{ type.name }}</span>
    </div>
    {% empty %}
    <p class="text-base-content/50 text-sm py-4 text-center col-span-full">{% trans "No business types available for this sector" %}</p>
    {% endfor %}
</div>
