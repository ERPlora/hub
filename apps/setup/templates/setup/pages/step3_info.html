{% extends "setup/wizard_base.html" %}
{% load i18n djicons %}

{% block wizard_content %}
<div class="setup-step-header">
    <div class="setup-step-number">3</div>
    <h2 class="setup-step-title">{% trans "Business Info" %}</h2>
    <p class="setup-step-subtitle">{% trans "Tell us about your business" %}</p>
</div>

<form method="post" action="{% url 'setup:step_info' %}">
    {% csrf_token %}

    <!-- Business Name -->
    <div class="form-group mb-4">
        <label class="form-group-label" for="business_name">{% trans "Business Name" %} *</label>
        <input type="text" id="business_name" name="business_name"
               class="input glass" required
               value="{{ setup_data.business_name|default:store_config.business_name }}"
               placeholder="{% trans 'e.g., La Terraza' %}">
    </div>

    <!-- VAT Number -->
    <div class="form-group mb-4">
        <label class="form-group-label" for="vat_number">{% trans "VAT / Tax ID" %}</label>
        <input type="text" id="vat_number" name="vat_number"
               class="input glass"
               value="{{ setup_data.vat_number|default:store_config.vat_number }}"
               placeholder="{% trans 'e.g., B12345678' %}">
    </div>

    <!-- Address -->
    <div class="form-group mb-4">
        <label class="form-group-label" for="business_address">{% trans "Address" %}</label>
        <textarea id="business_address" name="business_address"
                  class="textarea glass" rows="2"
                  placeholder="{% trans 'Street, City, Postal Code' %}">{{ setup_data.business_address|default:store_config.business_address }}</textarea>
    </div>

    <!-- Phone -->
    <div class="form-group mb-4">
        <label class="form-group-label" for="phone">{% trans "Phone" %}</label>
        <input type="tel" id="phone" name="phone"
               class="input glass"
               value="{{ setup_data.phone|default:store_config.phone }}"
               placeholder="{% trans '+34 600 000 000' %}">
    </div>

    <!-- Email -->
    <div class="form-group mb-4">
        <label class="form-group-label" for="email">{% trans "Email" %}</label>
        <input type="email" id="email" name="email"
               class="input glass"
               value="{{ setup_data.email|default:store_config.email }}"
               placeholder="{% trans 'info@yourbusiness.com' %}">
    </div>

    <!-- Navigation -->
    <div class="setup-nav">
        <a href="{% url 'setup:step_business' %}" class="btn btn-outline">
            {% icon "arrow-back-outline" %}
            {% trans "Back" %}
        </a>
        <button type="submit" class="btn color-primary">
            {% trans "Next" %}
            {% icon "arrow-forward-outline" %}
        </button>
    </div>
</form>
{% endblock %}
